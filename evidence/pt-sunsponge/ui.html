<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SunSponge — Website Capture</title>
  <link rel="stylesheet" href="/sunsponge.css" />
</head>
<body>
  <div class="shell">
    <header class="shell__header">
      <div class="shell__brand">
        <span class="shell__mark" aria-hidden="true"></span>
        <div>
          <div class="shell__title">SunSponge</div>
          <div class="shell__tagline">Soak up a whole website into screenshots.</div>
        </div>
      </div>
    </header>
    <main class="shell__main" id="root"></main>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/api.js"></script>
  <script type="text/babel" data-presets="react" src="/icons.js"></script>
  <script type="text/babel" data-presets="react" src="/RestedCaptureView.jsx"></script>
  <script type="text/babel" data-presets="react">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<RestedCaptureView />);
  </script>
</body>
</html>
